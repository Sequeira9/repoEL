name: Update OMIE Portugal prices

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end:
        description: "End date (YYYY-MM-DD)"
        required: true

permissions:
  contents: write

jobs:
  update-omie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run OMIE updater
        run: python scripts/update_omie_pt.py
        env:
          START_DATE: ${{ github.event.inputs.start }}
          END_DATE: ${{ github.event.inputs.end }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/omie
          git diff --cached --quiet || git commit -m "chore: update OMIE Portugal prices"
          git push

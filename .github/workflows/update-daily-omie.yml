name: Daily OMIE update

on:
  schedule:
    - cron: "0 14,15,16,17,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-omie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Update next OMIE day
        run: python scripts/update_daily_omie.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/omie
          git diff --cached --quiet || git commit -m "chore: daily OMIE update"
          git push
